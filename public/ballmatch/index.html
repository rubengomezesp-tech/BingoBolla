<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>BINGO BOLLA · Ball Match — Motor Fase 1</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Pacifico&display=swap" rel="stylesheet">
<style>
  :root{
    --gold:#C8941A; --gold-lite:#FFD98A; --magenta:#FF3D7F; --magenta-deep:#c8264f;
    --bg:#08080C; --panel:#160a32; --panel-lite:#2a1456;
    --green:#3ddc78; --cyan:#3aa8e0;
    --cell:rgba(255,255,255,.04);
  }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;
    user-select:none;-webkit-user-select:none;}
  html,body{height:100%;}
  body{
    font-family:'Fredoka',system-ui,sans-serif;color:#fff;overflow:hidden;
    background:
      radial-gradient(circle at 20% 10%,rgba(255,61,127,.18),transparent 45%),
      radial-gradient(circle at 85% 90%,rgba(58,168,224,.16),transparent 45%),
      linear-gradient(180deg,#150a2e 0%,#0a0418 60%,#08080C 100%);
  }

  .game{position:relative;width:100%;height:100dvh;display:flex;flex-direction:column;
    align-items:center;overflow:hidden;}

  /* ---------- HUD superior ---------- */
  .top{width:100%;max-width:520px;padding:calc(env(safe-area-inset-top) + 12px) 14px 8px;
    display:flex;align-items:center;gap:10px;}
  .logo{font-family:'Pacifico',cursive;font-size:22px;line-height:1;
    background:linear-gradient(180deg,#ff8fd0,var(--magenta));
    -webkit-background-clip:text;background-clip:text;color:transparent;
    filter:drop-shadow(0 0 8px rgba(255,80,160,.6));flex:1;}
  .logo small{display:block;font-family:'Fredoka';font-size:9px;font-weight:700;
    letter-spacing:3px;color:var(--cyan);-webkit-text-fill-color:var(--cyan);}
  .lvlchip{background:linear-gradient(180deg,var(--gold-lite),var(--gold));
    color:#3a1f00;font-weight:700;font-size:12px;padding:5px 12px;border-radius:12px;
    border:2px solid #fff;}

  /* ---------- Barra de objetivo + movimientos ---------- */
  .bars{width:100%;max-width:520px;padding:4px 14px 10px;display:flex;gap:10px;}
  .goalbox,.movesbox{flex:1;background:linear-gradient(180deg,rgba(42,20,86,.7),rgba(22,10,50,.8));
    border:1.5px solid rgba(255,200,90,.3);border-radius:14px;padding:8px 12px;
    display:flex;align-items:center;gap:9px;}
  .goalbox .gi{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;
    justify-content:center;font-size:18px;flex:0 0 auto;
    background:radial-gradient(circle at 35% 30%,#ffe48a,#e0901a 70%,#9c5e0a);}
  .goalbox .gt{font-size:10px;color:#c7a8e8;font-weight:600;line-height:1.1;}
  .goalbox .gv{font-size:17px;font-weight:700;}
  .movesbox{flex:0 0 92px;flex-direction:column;gap:0;align-items:center;justify-content:center;}
  .movesbox .mv{font-size:24px;font-weight:700;line-height:1;color:var(--gold-lite);}
  .movesbox .ml{font-size:9px;color:#c7a8e8;font-weight:600;letter-spacing:1px;}

  /* ---------- BOLLA FEVER ---------- */
  .feverbar{width:100%;max-width:520px;padding:0 14px 8px;display:flex;
    align-items:center;gap:8px;}
  .fv-ic{font-size:20px;filter:drop-shadow(0 0 6px rgba(255,120,40,.8));
    transition:transform .3s;}
  .fv-track{flex:1;position:relative;height:22px;border-radius:12px;
    background:rgba(0,0,0,.45);border:1.5px solid rgba(255,150,50,.4);overflow:hidden;}
  .fv-fill{position:absolute;inset:0;width:0%;border-radius:12px;
    background:linear-gradient(90deg,#7a3ad0,#ff4d9a 45%,#ffd23d 85%,#ffe48a);
    box-shadow:0 0 14px rgba(255,130,60,.7);
    transition:width .55s cubic-bezier(.25,1,.35,1);}
  .fv-label{position:absolute;inset:0;display:flex;align-items:center;
    justify-content:center;font-size:10px;font-weight:800;color:#fff;
    letter-spacing:1px;text-shadow:0 1px 3px rgba(0,0,0,.7);z-index:2;}
  .fv-mult{font-size:14px;font-weight:800;color:#ffd23d;opacity:.35;
    transition:all .3s;min-width:34px;text-align:center;}
  .feverbar.ready .fv-ic{transform:scale(1.3);animation:fvShake .4s ease-in-out infinite;}
  .feverbar.ready .fv-mult{opacity:1;text-shadow:0 0 12px rgba(255,200,60,.9);
    animation:fvMultPulse 1s ease-in-out infinite;}
  @keyframes fvShake{0%,100%{transform:scale(1.3) rotate(-6deg)}
    50%{transform:scale(1.4) rotate(6deg)}}
  @keyframes fvMultPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.18)}}

  body.fever{animation:feverBg 1.2s ease-in-out infinite;}
  @keyframes feverBg{0%,100%{background:
      radial-gradient(circle at 20% 10%,rgba(255,61,127,.35),transparent 45%),
      radial-gradient(circle at 85% 90%,rgba(255,200,60,.3),transparent 45%),
      linear-gradient(180deg,#2a0a3e 0%,#1a0628 60%,#120020 100%)}
    50%{background:
      radial-gradient(circle at 30% 20%,rgba(255,200,60,.4),transparent 50%),
      radial-gradient(circle at 75% 80%,rgba(255,61,127,.38),transparent 50%),
      linear-gradient(180deg,#3a0f4e 0%,#220a36 60%,#160826 100%)}}
  body.fever .board{box-shadow:0 18px 50px rgba(0,0,0,.55),
    0 0 50px rgba(255,150,50,.55),inset 0 0 40px rgba(255,80,160,.18)!important;
    animation:feverBoard .6s ease-in-out infinite;}
  @keyframes feverBoard{0%,100%{transform:scale(1)}50%{transform:scale(1.012)}}

  .feverflash{position:fixed;inset:0;z-index:70;pointer-events:none;
    display:flex;align-items:center;justify-content:center;
    background:radial-gradient(circle,rgba(255,200,60,.35),rgba(255,61,127,.2) 60%,transparent);
    opacity:0;}
  .feverflash.go{animation:fvFlash 1.6s ease-out;}
  @keyframes fvFlash{0%{opacity:0}15%{opacity:1}100%{opacity:0}}
  .feverflash span{font-family:'Pacifico',cursive;font-size:44px;color:#fff;
    text-shadow:0 0 24px rgba(255,180,40,1),0 4px 10px rgba(0,0,0,.6);transform:scale(0);}
  .feverflash.go span{animation:fvText 1.6s cubic-bezier(.2,1.4,.4,1);}
  @keyframes fvText{0%{transform:scale(0) rotate(-20deg)}
    30%{transform:scale(1.2) rotate(8deg)}60%{transform:scale(1)}
    100%{transform:scale(1.1);opacity:0}}

  /* lluvia de BILLETES */
  .bill{position:fixed;font-size:26px;z-index:65;pointer-events:none;top:-50px;
    will-change:transform;}
  @keyframes billFall{0%{transform:translateY(0) rotate(0)}
    100%{transform:translateY(120vh) rotate(540deg)}}

  /* ---------- Cartón Bingo MINI (esquina, Fase 5) ---------- */
  .cartonwrap{position:absolute;top:calc(env(safe-area-inset-top) + 96px);right:10px;
    z-index:18;display:flex;flex-direction:column;align-items:flex-end;}
  .carton{background:linear-gradient(180deg,#fff8ec,#f3e4c8);
    border-radius:10px;padding:4px;border:1.5px solid var(--gold);
    box-shadow:0 5px 14px rgba(0,0,0,.5),0 0 12px rgba(255,190,50,.3);
    width:128px;}
  .bingohdr{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;margin-bottom:2px;}
  .bingohdr span{text-align:center;font-weight:800;font-size:9px;color:#fff;
    border-radius:4px;padding:1px 0;}
  .bingohdr span:nth-child(1){background:#e0408a;}
  .bingohdr span:nth-child(2){background:#e0901a;}
  .bingohdr span:nth-child(3){background:#27a85a;}
  .bingohdr span:nth-child(4){background:#2a7fd6;}
  .bingohdr span:nth-child(5){background:#9a4ad0;}
  .bingogrid{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;}
  .bcell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;
    background:#fffdf8;border-radius:4px;font-weight:700;font-size:9px;
    color:#5a4422;border:1px solid rgba(0,0,0,.07);transition:all .25s;position:relative;}
  .bcell.free{background:radial-gradient(circle at 40% 35%,#ffe48a,var(--gold));color:#5a3a00;}
  .bcell.mark{background:radial-gradient(circle at 40% 35%,#ff9ad4,var(--magenta));
    color:#fff;transform:scale(1.04);box-shadow:0 0 8px rgba(255,80,160,.7);
    animation:bmark .4s ease-out;}
  @keyframes bmark{0%{transform:scale(.5)}60%{transform:scale(1.2)}100%{transform:scale(1.04)}}
  .bcell.line{background:radial-gradient(circle at 40% 35%,#ffe48a,var(--gold))!important;
    color:#5a2a00!important;box-shadow:0 0 10px rgba(255,200,60,.95)!important;
    animation:bline 1s ease-in-out infinite;}
  @keyframes bline{0%,100%{filter:brightness(1)}50%{filter:brightness(1.4)}}
  .bingofx{position:absolute;right:0;top:140px;
    font-family:'Pacifico',cursive;font-size:18px;color:var(--gold-lite);
    text-shadow:0 0 12px rgba(255,180,40,.9);pointer-events:none;opacity:0;z-index:20;
    white-space:nowrap;}
  .bingofx.show{animation:bfx 1.1s ease-out;}
  @keyframes bfx{0%{opacity:0;transform:scale(.4)}
    30%{opacity:1;transform:scale(1.15)}
    70%{opacity:1;transform:scale(1)}
    100%{opacity:0;transform:translateY(-30px) scale(.9)}}

  /* ---------- Tablero ---------- */
  .boardwrap{flex:1;display:flex;align-items:center;justify-content:center;width:100%;
    padding:0 10px 10px;min-height:0;}
  .board{
    --n:8;
    position:relative;width:min(94vw,460px,calc(100dvh - 300px));
    aspect-ratio:1;
    background:linear-gradient(135deg,rgba(42,20,86,.55),rgba(16,8,38,.7));
    border:2px solid rgba(255,200,90,.25);border-radius:22px;
    padding:8px;box-shadow:0 18px 50px rgba(0,0,0,.55),inset 0 0 30px rgba(255,61,127,.08);
    touch-action:none;
  }
  .grid{position:absolute;inset:8px;display:grid;
    grid-template-columns:repeat(var(--n),1fr);
    grid-template-rows:repeat(var(--n),1fr);gap:2px;}
  .cellbg{background:var(--cell);border-radius:10px;}

  .tile{
    position:absolute;display:flex;align-items:center;justify-content:center;
    border-radius:13px;cursor:pointer;will-change:transform,opacity;
    transition:transform .26s cubic-bezier(.2,.9,.3,1);
    font-size:clamp(18px,5.4vw,30px);font-weight:800;
  }
  .tile .face{width:78%;height:78%;border-radius:50%;display:flex;align-items:center;
    justify-content:center;box-shadow:inset 0 3px 6px rgba(255,255,255,.35),
    inset 0 -4px 8px rgba(0,0,0,.35),0 3px 8px rgba(0,0,0,.4);position:relative;}
  .tile .face::after{content:'';position:absolute;top:14%;left:20%;width:34%;height:26%;
    border-radius:50%;background:rgba(255,255,255,.5);filter:blur(2px);}
  /* tipos de ficha */
  .t-ballB .face{background:radial-gradient(circle at 35% 30%,#ff9ad4,var(--magenta) 60%,var(--magenta-deep));}
  .t-ballB .sym{color:#fff;font-family:'Pacifico',cursive;font-size:1.05em;
    text-shadow:0 1px 2px rgba(0,0,0,.4);z-index:1;}
  .t-coin .face{background:radial-gradient(circle at 35% 30%,#ffe48a,var(--gold) 60%,#8a5e10);}
  .t-coin .sym{color:#5a3a00;font-weight:800;z-index:1;}
  .t-clover .face{background:radial-gradient(circle at 35% 30%,#8effb0,#27c46a 60%,#138a40);}
  .t-clover .sym{filter:drop-shadow(0 1px 1px rgba(0,0,0,.3));z-index:1;}
  .t-star .face{background:radial-gradient(circle at 35% 30%,#a8e0ff,var(--cyan) 60%,#1a6a9c);}
  .t-star .sym{color:#fff;z-index:1;text-shadow:0 1px 2px rgba(0,0,0,.4);}
  .t-diamond .face{background:radial-gradient(circle at 35% 30%,#d8f4ff,#7ad0ff 55%,#3a8fc0);}
  .t-diamond .sym{z-index:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,.35));}
  .t-purple .face{background:radial-gradient(circle at 35% 30%,#d9a8ff,#9a4ad0 60%,#5e1f8a);}
  .t-purple .sym{color:#fff;z-index:1;}

  .tile.sel .face{transform:scale(1.12);box-shadow:0 0 0 3px #fff,
    0 0 18px rgba(255,210,80,.9),inset 0 3px 6px rgba(255,255,255,.4);}
  .tile.pop{animation:pop .26s ease-out forwards;}
  @keyframes pop{0%{transform:scale(1)}45%{transform:scale(1.22)}
    100%{transform:scale(0);opacity:0}}
  .tile.fall{transition:transform .30s cubic-bezier(.3,.7,.3,1);}
  .tile.spawn{animation:spawn .3s ease-out;}
  @keyframes spawn{from{opacity:0;transform:translateY(-12px) scale(.6)}
    to{opacity:1}}

  /* burst de match */
  .burst{position:absolute;width:8px;height:8px;border-radius:50%;pointer-events:none;
    z-index:30;animation:burst .55s ease-out forwards;}
  @keyframes burst{0%{transform:translate(0,0) scale(1);opacity:1}
    100%{transform:translate(var(--bx),var(--by)) scale(0);opacity:0}}

  /* FASE 2 · fichas especiales */
  .spbadge{position:absolute;bottom:-2px;right:-2px;font-size:.62em;
    filter:drop-shadow(0 1px 2px rgba(0,0,0,.6));z-index:2;}
  .sp-bomb .face{box-shadow:inset 0 3px 6px rgba(255,255,255,.4),
    inset 0 -4px 8px rgba(0,0,0,.4),0 0 16px rgba(255,90,40,.9),
    0 3px 8px rgba(0,0,0,.4);animation:spPulseB 1.1s ease-in-out infinite;}
  @keyframes spPulseB{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3)}}
  .sp-cross .face{box-shadow:inset 0 3px 6px rgba(255,255,255,.4),
    0 0 18px rgba(58,200,255,.9),0 3px 8px rgba(0,0,0,.4);
    animation:spPulseC 1s ease-in-out infinite;}
  @keyframes spPulseC{0%,100%{transform:rotate(0)}50%{transform:rotate(8deg)}}
  .rainbowface{background:conic-gradient(#ff4d9a,#ffd23d,#3ddc78,#3de8ff,#7a3ad0,#ff4d9a)!important;
    animation:rbSpin 3s linear infinite;}
  @keyframes rbSpin{to{transform:rotate(360deg)}}
  .sp-rainbow .sym{animation:rbSpinR 3s linear infinite;}
  @keyframes rbSpinR{to{transform:rotate(-360deg)}}
  .tile.born .face{animation:born .45s cubic-bezier(.2,1.4,.4,1);}
  @keyframes born{0%{transform:scale(.2) rotate(-90deg)}
    60%{transform:scale(1.25) rotate(10deg)}100%{transform:scale(1)}}

  /* OBSTÁCULOS */
  .obs-face{position:relative;overflow:hidden;}
  .obs-icon{position:absolute;inset:0;display:flex;align-items:center;
    justify-content:center;font-size:1em;z-index:3;pointer-events:none;}
  .obs-sym{opacity:.35;z-index:1;}
  .obs-hits{position:absolute;bottom:1px;right:2px;font-size:.5em;font-weight:800;
    color:#fff;z-index:4;text-shadow:0 1px 2px rgba(0,0,0,.8);}

  /* HIELO ❄️ */
  .obs-ice .face{background:radial-gradient(circle at 35% 30%,#d8f4ff,#7ad0ff 55%,#3a8fc0)!important;
    box-shadow:0 0 12px rgba(100,200,255,.6),inset 0 0 8px rgba(255,255,255,.4)!important;}
  .obs-ice .obs-icon{color:#fff;text-shadow:0 0 8px rgba(100,220,255,.9);}

  /* CAJA 📦 */
  .obs-box .face{background:radial-gradient(circle at 35% 30%,#e8c86e,#c49a2a 60%,#8a6a14)!important;
    box-shadow:0 0 10px rgba(200,150,30,.5)!important;
    border:2px solid rgba(255,220,100,.6)!important;}

  /* CADENA ⛓️ */
  .obs-chain .face{background:radial-gradient(circle at 35% 30%,#8a8a9a,#4a4a5a 60%,#2a2a3a)!important;
    box-shadow:0 0 10px rgba(100,100,140,.4)!important;}
  .obs-chain .obs-icon{animation:chainShake .8s ease-in-out infinite;}
  @keyframes chainShake{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}

  /* golpe recibido */
  .tile.obs-hit .face{animation:obsHit .28s ease-out;}
  @keyframes obsHit{0%{transform:scale(1.18);filter:brightness(1.5)}
    100%{transform:scale(1);filter:brightness(1)}}

  /* onda de choque de especiales */
  .shock{position:absolute;width:20px;height:20px;border-radius:50%;
    transform:translate(-50%,-50%);pointer-events:none;z-index:25;
    border:3px solid rgba(255,200,80,.9);
    animation:shock .5s ease-out forwards;}
  .shock.rb{border-color:rgba(255,90,180,.9);}
  @keyframes shock{0%{width:20px;height:20px;opacity:.95}
    100%{width:160px;height:160px;opacity:0}}

  /* ---------- BOOSTERS ---------- */
  .boosterbar{width:100%;max-width:520px;padding:4px 10px 6px;
    display:flex;gap:5px;justify-content:center;}
  .bst{flex:1;max-width:58px;aspect-ratio:1;border:none;cursor:pointer;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:1px;border-radius:14px;font-size:20px;position:relative;
    background:linear-gradient(180deg,rgba(42,20,86,.92),rgba(20,10,50,.95));
    border:1.5px solid rgba(255,200,90,.35);
    box-shadow:0 4px 12px rgba(0,0,0,.5);
    transition:transform .15s,filter .2s,box-shadow .2s;}
  .bst span{font-size:7px;font-weight:800;color:var(--gold-lite);
    letter-spacing:.5px;line-height:1;}
  .bst:active{transform:scale(.9);}
  .bst:hover:not(.used):not(.targeting){
    box-shadow:0 0 16px rgba(255,180,50,.6);transform:scale(1.06);}
  .bst.used{filter:grayscale(.9) brightness(.45);cursor:default;pointer-events:none;}
  .bst.targeting{
    border-color:var(--magenta);
    box-shadow:0 0 20px rgba(255,61,127,.8),0 0 40px rgba(255,61,127,.4);
    animation:bstPulse .7s ease-in-out infinite;}
  @keyframes bstPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
  .bst .charge{position:absolute;top:-3px;right:-3px;width:16px;height:16px;
    border-radius:50%;background:linear-gradient(180deg,#7dffb0,#2aa85a);
    border:1.5px solid #fff;font-size:9px;font-weight:800;color:#063;
    display:flex;align-items:center;justify-content:center;}
  /* highlight de fila/col en modo targeting */
  .tile.row-hint .face{box-shadow:0 0 0 3px rgba(255,61,127,.8)!important;
    filter:brightness(1.3);}
  .tile.col-hint .face{box-shadow:0 0 0 3px rgba(255,200,60,.8)!important;
    filter:brightness(1.3);}

  /* ---------- Footer estado ---------- */
  .foot{width:100%;max-width:520px;padding:6px 14px calc(env(safe-area-inset-bottom) + 14px);
    display:flex;gap:10px;align-items:center;}
  .score{flex:1;font-size:13px;color:#c7a8e8;font-weight:600;}
  .score b{color:#fff;font-size:18px;font-weight:700;}
  .btn{background:linear-gradient(180deg,var(--gold-lite),var(--gold) 55%,#8a5e10);
    color:#3a1f00;font-family:inherit;font-weight:700;font-size:14px;border:2px solid #fff5dd;
    padding:10px 20px;border-radius:14px;cursor:pointer;
    box-shadow:0 5px 16px rgba(255,190,50,.4);transition:transform .12s;}
  .btn:active{transform:scale(.95);}

  /* ---------- Overlay fin ---------- */
  .overlay{position:fixed;inset:0;z-index:80;display:none;align-items:center;
    justify-content:center;background:rgba(8,4,20,.78);backdrop-filter:blur(6px);}
  .overlay.show{display:flex;animation:fade .3s;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .card{width:88%;max-width:360px;text-align:center;padding:32px 26px;border-radius:26px;
    background:linear-gradient(180deg,var(--panel-lite),var(--panel));
    border:2px solid rgba(255,200,90,.4);box-shadow:0 20px 60px rgba(0,0,0,.6);
    animation:rise .4s cubic-bezier(.2,1,.3,1);}
  @keyframes rise{from{transform:translateY(30px) scale(.9);opacity:0}to{transform:none;opacity:1}}
  .card h2{font-family:'Pacifico',cursive;font-size:32px;margin-bottom:6px;}
  .card.win h2{color:var(--gold-lite);}
  .card.lose h2{color:#ff6b9a;}
  .card p{font-size:14px;color:#c7a8e8;margin-bottom:14px;}
  .card .big{font-size:34px;font-weight:700;color:#fff;margin:6px 0 2px;}

  /* estrellas de resultado */
  .stars{display:flex;justify-content:center;gap:6px;margin:14px 0 10px;}
  .star{width:58px;height:58px;display:flex;align-items:center;justify-content:center;
    font-size:44px;color:rgba(255,255,255,.14);transform:scale(0);
    transition:none;}
  .star:nth-child(2){margin-top:-14px;}
  .star.on{color:var(--gold-lite);
    text-shadow:0 0 18px rgba(255,200,60,.95),0 0 6px rgba(255,150,30,.8);
    animation:starPop .5s cubic-bezier(.2,1.5,.4,1) forwards;}
  .star.off{transform:scale(1);}
  @keyframes starPop{0%{transform:scale(0) rotate(-40deg)}
    60%{transform:scale(1.35) rotate(12deg)}100%{transform:scale(1) rotate(0)}}
  .resgrid{display:flex;flex-direction:column;gap:5px;margin:6px 0 10px;font-size:12px;}
  .resrow{display:flex;justify-content:space-between;padding:5px 12px;
    background:rgba(255,255,255,.05);border-radius:9px;color:#d8c7ef;}
  .resrow b{color:#fff;}
  .resrow.ok b{color:var(--gold-lite);}
  .xpgain{font-size:13px;font-weight:700;color:var(--cyan);margin:4px 0 0;}
  .xpgain b{color:#fff;font-size:16px;}
  .reqnote{font-size:11px;color:#ff9ad4;margin-top:6px;}

  /* recaudación final */
  .recaudo{margin:4px 0 12px;padding:10px;border-radius:14px;
    background:linear-gradient(180deg,rgba(255,200,80,.12),rgba(255,150,30,.06));
    border:1.5px solid rgba(255,200,90,.35);}
  .rec-lbl{font-size:10px;font-weight:700;letter-spacing:2px;color:#c7a8e8;}
  .rec-val{font-size:32px;font-weight:700;color:var(--gold-lite);
    text-shadow:0 0 14px rgba(255,190,50,.7);line-height:1.1;}
  .rec-ic{font-size:24px;}

  /* barra XP animada */
  .xpwrap{margin:10px 0 4px;}
  .xphdr{display:flex;justify-content:space-between;font-size:11px;
    color:#c7a8e8;font-weight:600;margin-bottom:5px;}
  .xphdr b{color:var(--gold-lite);}
  .xptrack{height:14px;border-radius:8px;background:rgba(0,0,0,.4);
    overflow:hidden;border:1px solid rgba(170,120,255,.3);}
  .xpfill{height:100%;width:0%;border-radius:8px;
    background:linear-gradient(90deg,#9a4ad0,#ff4d9a 55%,#ffd23d);
    box-shadow:0 0 12px rgba(255,120,200,.6);
    transition:width 1.2s cubic-bezier(.22,1,.36,1);}
  .xpfill.levelup{animation:xpFlash .5s ease-out 2;}
  @keyframes xpFlash{0%,100%{filter:brightness(1)}50%{filter:brightness(1.6)}}

  /* toast combo */
  .combo{position:fixed;left:50%;top:38%;transform:translate(-50%,-50%) scale(0);
    z-index:60;font-family:'Pacifico',cursive;font-size:38px;pointer-events:none;
    color:var(--gold-lite);text-shadow:0 0 16px rgba(255,180,40,.9),0 3px 8px rgba(0,0,0,.6);}
  .combo.show{animation:comboPop 1s ease-out;}
  @keyframes comboPop{0%{transform:translate(-50%,-50%) scale(0);opacity:0}
    25%{transform:translate(-50%,-50%) scale(1.15);opacity:1}
    70%{transform:translate(-50%,-50%) scale(1);opacity:1}
    100%{transform:translate(-50%,-90%) scale(.8);opacity:0}}
</style>

<body>

<script>
"use strict";
/* ============================================================
   BINGO BOLLA · BALL MATCH — Motor Fase 1 (lógica real)
   - Tablero 8x8, swap adyacente válido
   - Detección de matches horizontal/vertical 3+
   - Resolución en cascada con gravedad y relleno
   - Objetivo por nivel + movimientos + puntuación + combos
   ============================================================ */

const wait = ms => new Promise(r=>setTimeout(r,ms));

const N = 8;
const TYPES = ["ballB","coin","clover","star","diamond","purple"];
const SYM = { ballB:"B", coin:"B", clover:"🍀", star:"★", diamond:"💎", purple:"◆" };

// Fichas especiales (combinaciones)
const SPECIAL = { bomb:"💣", cross:"✦", rainbow:"🌈" };

// OBSTÁCULOS · obstacle: null | "ice" | "box" | "chain"
// hits: golpes restantes para romper (ice=1, box=2, chain=1)
// No se pueden mover, solo se rompen con matches adyacentes
const OBS_ICON = { ice:"❄️", box:"📦", chain:"⛓️" };
const OBS_HITS = { ice:1, box:2, chain:1 };

const board = document.getElementById("board");
const gridbg = document.getElementById("gridbg");
const elMoves = document.getElementById("moves");
const elScore = document.getElementById("score");
const elGoalLeft = document.getElementById("goalLeft");
const elGoalName = document.getElementById("goalName");
const elGoalIcon = document.getElementById("goalIcon");
const elLvl = document.getElementById("lvlchip");
const elCombo = document.getElementById("combo");
const overlay = document.getElementById("overlay");
const card = document.getElementById("card");

let grid = [];        // matriz N x N de {type, el, r, c}
let level = 1;
let moves = 20;
let score = 0;
let goalType = "coin";
let goalLeft = 20;
let busy = false;     // bloquea input mientras resuelve cascada
let sel = null;       // tile seleccionada

// BOLLA FEVER
let fever = 0;            // 0..FEVER_MAX
const FEVER_MAX = 10;     // unidades para llenar la barra
let feverActive = false;  // modo x10 activo
let feverMult = 1;        // multiplicador actual (1 normal, 10 en fever)
let feverTimer = null;

// FASE 4 · sistema de estrellas / dificultad
let movesStart = 20;     // movimientos iniciales del nivel
let goalTotal = 20;      // objetivo total (para calcular si se cumplió)
let combosThisLevel = 0; // combos encadenados acumulados
let bestStars = {};      // {nivel: estrellas} progreso (memoria de sesión)
let totalXP = 0;         // XP acumulado (local; se conectará a player_xp después)

// XP del jugador con niveles (curva creciente, estilo Candy Crush/Coin Master)
let playerXP = 0;
let playerLvl = 1;
function xpForLvl(l){ return 100 + (l-1)*80; }   // XP que pide cada nivel

// Requisito de estrellas para desbloquear el SIGUIENTE nivel (mixto, sube gradual).
// Nunca regala: incluso nivel 1 hay que jugar bien para 1★.
function starsRequiredToPass(n){
  if (n < 4)  return 1;        // 1-3: pasa con 1★ (pero 1★ cuesta)
  if (n < 9)  return 1;        // 4-8: aún 1★, dificultad sube por objetivo
  if (n < 16) return 2;        // 9-15: exige 2★ (mundo 2 aprox)
  return 2;                    // 16+: 2★ mínimo, niveles duros piden 3★ por diseño
}

// Construir celdas de fondo
for (let i = 0; i < N*N; i++) {
  const d = document.createElement("div");
  d.className = "cellbg";
  gridbg.appendChild(d);
}

// Geometría: tamaño de celda relativo al board
function cellSize(){
  const inner = board.clientWidth - 16; // padding 8 cada lado
  return inner / N;
}
function place(tileObj, animateFall){
  const s = cellSize();
  const t = tileObj.el;
  t.style.width = s - 2 + "px";
  t.style.height = s - 2 + "px";
  t.classList.toggle("fall", !!animateFall);
  t.style.transform =
    `translate(${tileObj.c * s + 1}px, ${tileObj.r * s + 1}px)`;
}

function makeTile(type, r, c, special, obstacle){
  const t = document.createElement("div");
  t.className = `tile t-${type} spawn` +
    (special   ? ` sp-${special}` : "") +
    (obstacle  ? ` obs-${obstacle}` : "");
  let inner;
  if(obstacle){
    inner = `<div class="face obs-face">
      <span class="obs-icon">${OBS_ICON[obstacle]}</span>
      <span class="sym obs-sym">${SYM[type]}</span>
      <span class="obs-hits" id="h${r}_${c}"></span>
    </div>`;
  } else if(special==="rainbow"){
    inner = `<div class="face rainbowface"><span class="sym">🌈</span></div>`;
  } else if(special){
    inner = `<div class="face"><span class="sym">${SYM[type]}</span><span class="spbadge">${SPECIAL[special]}</span></div>`;
  } else {
    inner = `<div class="face"><span class="sym">${SYM[type]}</span></div>`;
  }
  t.innerHTML = inner;
  const hits = obstacle ? OBS_HITS[obstacle] : 0;
  const obj = { type, el:t, r, c, special: special||null, obstacle: obstacle||null, hits };
  t.addEventListener("pointerdown", (e)=>{ e.preventDefault(); onPick(obj); });
  board.appendChild(t);
  place(obj, false);
  return obj;
}

// Generar tablero SIN matches iniciales
function build(){
  // limpiar
  document.querySelectorAll(".tile").forEach(n=>n.remove());
  grid = [];
  for (let r=0;r<N;r++){
    grid[r]=[];
    for (let c=0;c<N;c++){
      let type, guard=0;
      do {
        type = TYPES[(Math.random()*TYPES.length)|0];
        guard++;
      } while (guard<20 && makesMatchAt(r,c,type));
      grid[r][c] = makeTile(type, r, c);
    }
  }
}

// ¿colocar 'type' en r,c crearía un match? (solo mira izquierda y arriba al construir)
function makesMatchAt(r,c,type){
  if (c>=2 && grid[r][c-1]?.type===type && grid[r][c-2]?.type===type) return true;
  if (r>=2 && grid[r-1]?.[c]?.type===type && grid[r-2]?.[c]?.type===type) return true;
  return false;
}

function adjacent(a,b){
  return (Math.abs(a.r-b.r)+Math.abs(a.c-b.c))===1;
}

function onPick(obj){
  if(busy) return;
  // BOOSTERS · modo targeting: el toque elige fila/col
  if(targetingBooster){ handleTargetTap(obj); return; }
  if (!sel){
    sel = obj; obj.el.classList.add("sel");
    return;
  }
  if (sel===obj){ obj.el.classList.remove("sel"); sel=null; return; }
  sel.el.classList.remove("sel");
  if (adjacent(sel,obj)){
    trySwap(sel,obj);
    sel=null;
  } else {
    sel=obj; obj.el.classList.add("sel");
  }
}

function swapData(a,b){
  const ar=a.r, ac=a.c;
  a.r=b.r; a.c=b.c; b.r=ar; b.c=ac;
  grid[a.r][a.c]=a; grid[b.r][b.c]=b;
}

async function trySwap(a,b){
  busy=true;

  // FASE 2 · Rainbow: al intercambiarla, elimina todo el tipo del otro
  const rb = a.special==="rainbow" ? a : b.special==="rainbow" ? b : null;
  if(rb){
    const other = rb===a ? b : a;
    rb._rbTarget = other.special==="rainbow" ? rb.type : other.type;
    moves--; updateHUD();
    const visited=new Set();
    const hit=detonate(rb.r,rb.c,visited);
    let gained=0;
    hit.forEach(k=>{ const[r,c]=k.split(",").map(Number);
      const tl=grid[r][c]; if(!tl)return;
      gained+=20; if(tl.type===goalType&&goalLeft>0)goalLeft--;
      spawnBurst(tl,"rainbow"); tl.el.classList.add("pop"); });
    score+=gained; updateHUD();
    showCombo(3);
    await wait(300);
    hit.forEach(k=>{ const[r,c]=k.split(",").map(Number);
      if(grid[r][c]){ grid[r][c].el.remove(); grid[r][c]=null; } });
    for(let c=0;c<N;c++){ let w=N-1;
      for(let r=N-1;r>=0;r--){ if(grid[r][c]){ if(w!==r){const t=grid[r][c];
        grid[w][c]=t;grid[r][c]=null;t.r=w;t.c=c;place(t,true);} w--; } }
      for(let r=w;r>=0;r--){ grid[r][c]=makeTile(TYPES[(Math.random()*TYPES.length)|0],r,c);} }
    await wait(330);
    await resolve();
    busy=false; checkEnd(); return;
  }

  swapData(a,b);
  place(a,true); place(b,true);
  await wait(280);

  const matches = findMatches();
  if (matches.size===0){
    swapData(a,b);
    place(a,true); place(b,true);
    await wait(280);
    busy=false;
    return;
  }
  moves--; updateHUD();
  await resolve();
  busy=false;
  checkEnd();
}

// FASE 2 · Detección avanzada.
// Devuelve { cells:Set("r,c"), groups:[{type,cells:[],len,shape,pivot}] }
// shape: "line4" | "line5" | "TL" | "line3"
function scanLines(){
  const horiz=[], vert=[];
  // runs horizontales
  for (let r=0;r<N;r++){
    let c=0;
    while(c<N){
      if(!grid[r][c]){c++;continue;}
      let c2=c;
      while(c2+1<N && grid[r][c2+1] && grid[r][c2+1].type===grid[r][c].type) c2++;
      const len=c2-c+1;
      if(len>=3){ const cells=[]; for(let k=c;k<=c2;k++) cells.push([r,k]);
        horiz.push({type:grid[r][c].type,cells,len,axis:"h"}); }
      c=c2+1;
    }
  }
  // runs verticales
  for (let c=0;c<N;c++){
    let r=0;
    while(r<N){
      if(!grid[r][c]){r++;continue;}
      let r2=r;
      while(r2+1<N && grid[r2+1][c] && grid[r2+1][c].type===grid[r][c].type) r2++;
      const len=r2-r+1;
      if(len>=3){ const cells=[]; for(let k=r;k<=r2;k++) cells.push([k,c]);
        vert.push({type:grid[r][c].type,cells,len,axis:"v"}); }
      r=r2+1;
    }
  }

  // Fusionar H y V que se cruzan (mismo type) -> forma T o L
  const groups=[];
  const usedH=new Set(), usedV=new Set();
  horiz.forEach((h,hi)=>{
    vert.forEach((v,vi)=>{
      if(h.type!==v.type) return;
      const inter=h.cells.find(([r,c])=>v.cells.some(([r2,c2])=>r===r2&&c===c2));
      if(inter){
        usedH.add(hi); usedV.add(vi);
        const cellMap={};
        [...h.cells,...v.cells].forEach(([r,c])=>cellMap[`${r},${c}`]=[r,c]);
        groups.push({type:h.type,cells:Object.values(cellMap),
          shape:"TL",pivot:inter});
      }
    });
  });
  // runs que no se fusionaron
  horiz.forEach((h,hi)=>{ if(usedH.has(hi))return;
    groups.push({type:h.type,cells:h.cells,
      shape:h.len>=5?"line5":h.len===4?"line4":"line3",
      pivot:h.cells[(h.len/2)|0]}); });
  vert.forEach((v,vi)=>{ if(usedV.has(vi))return;
    groups.push({type:v.type,cells:v.cells,
      shape:v.len>=5?"line5":v.len===4?"line4":"line3",
      pivot:v.cells[(v.len/2)|0]}); });

  const cells=new Set();
  groups.forEach(g=>g.cells.forEach(([r,c])=>cells.add(`${r},${c}`)));
  return {cells,groups};
}

// compat: ¿hay algún match? (para validar swap)
function findMatches(){ return scanLines().cells; }

// Detonar una ficha especial -> devuelve Set de celdas afectadas
function detonate(r,c,visited){
  const hit=new Set();
  const t=grid[r][c];
  if(!t) return hit;
  const key=`${r},${c}`;
  if(visited.has(key)) return hit;
  visited.add(key);
  hit.add(key);
  if(!t.special) return hit;

  if(t.special==="bomb"){           // 3x3
    for(let dr=-1;dr<=1;dr++)for(let dc=-1;dc<=1;dc++){
      const nr=r+dr,nc=c+dc;
      if(nr>=0&&nr<N&&nc>=0&&nc<N){ hit.add(`${nr},${nc}`);
        if(grid[nr][nc]?.special) detonate(nr,nc,visited).forEach(x=>hit.add(x)); }
    }
  } else if(t.special==="cross"){   // fila + columna enteras
    for(let i=0;i<N;i++){ hit.add(`${r},${i}`); hit.add(`${i},${c}`);
      if(grid[r][i]?.special&&!(i===c)) detonate(r,i,visited).forEach(x=>hit.add(x));
      if(grid[i][c]?.special&&!(i===r)) detonate(i,c,visited).forEach(x=>hit.add(x)); }
  } else if(t.special==="rainbow"){ // todo el color mas comun adyacente / su tipo
    const target = t._rbTarget || t.type;
    for(let rr=0;rr<N;rr++)for(let cc=0;cc<N;cc++)
      if(grid[rr][cc]&&grid[rr][cc].type===target) hit.add(`${rr},${cc}`);
  }
  return hit;
}

async function resolve(){
  let combo=0;
  while(true){
    const {cells,groups} = scanLines();
    if(cells.size===0) break;
    combo++;
    if(combo>=2){ showCombo(combo); combosThisLevel++; addFever(1.5); }
    else { addFever(0.6); }                    // cada match suma algo de Fever

    // 1) decidir fichas especiales a CREAR (4=bomb,5=rainbow,TL=cross)
    const toCreate=[]; // {r,c,type,special}
    groups.forEach(g=>{
      if(g.shape==="line5"){ const[r,c]=g.pivot; toCreate.push({r,c,type:g.type,special:"rainbow"}); }
      else if(g.shape==="TL"){ const[r,c]=g.pivot; toCreate.push({r,c,type:g.type,special:"cross"}); }
      else if(g.shape==="line4"){ const[r,c]=g.pivot; toCreate.push({r,c,type:g.type,special:"bomb"}); }
    });
    const createKeys=new Set(toCreate.map(o=>`${o.r},${o.c}`));

    // 2) expandir con detonaciones de especiales que esten dentro del match
    const visited=new Set();
    const allHit=new Set(cells);
    cells.forEach(k=>{ const[r,c]=k.split(",").map(Number);
      if(grid[r][c]?.special) detonate(r,c,visited).forEach(x=>allHit.add(x)); });

    // 3) puntuar + objetivo + fx
    let gained=0;
    const markTypes={};
    allHit.forEach(k=>{
      if(createKeys.has(k)) return;            // la que se transforma no se borra
      const[r,c]=k.split(",").map(Number);
      const tl=grid[r][c]; if(!tl) return;
      gained += 12*combo + (tl.special?40:0);
      if(tl.type===goalType && goalLeft>0) goalLeft--;
      markTypes[tl.type]=(markTypes[tl.type]||0)+1;
      spawnBurst(tl,tl.special);
      tl.el.classList.add("pop");
    });
    // FASE 3 · cada tipo eliminado marca 1 numero del carton (mas si hubo muchos)
    Object.entries(markTypes).forEach(([type,cnt])=>{
      const marks = 1 + (cnt>=5?1:0);
      for(let i=0;i<marks;i++) gained += bingoMark(type);
    });
    gained *= feverMult;                        // BOLLA FEVER · x10 si activo
    score+=gained; updateHUD();
    await wait(270);

    // FASE 6 · si ya se cumplió el objetivo (o bingo completo), cerrar YA
    if (goalLeft<=0 || bingoLines.size>=5){
      // limpiar visualmente lo que quedaba marcado y terminar
      allHit.forEach(k=>{ if(createKeys.has(k))return;
        const[r,c]=k.split(",").map(Number);
        if(grid[r][c]){ grid[r][c].el.remove(); grid[r][c]=null; } });
      checkEnd();
      return;
    }

    // 4) eliminar (menos las que se transforman)
    allHit.forEach(k=>{
      if(createKeys.has(k)) return;
      const[r,c]=k.split(",").map(Number);
      if(grid[r][c]){ grid[r][c].el.remove(); grid[r][c]=null; }
    });

    // OBSTÁCULOS · golpear obstáculos adyacentes a las celdas eliminadas
    const hitObs=new Set();
    allHit.forEach(k=>{
      const[r,c]=k.split(",").map(Number);
      [[r-1,c],[r+1,c],[r,c-1],[r,c+1]].forEach(([nr,nc])=>{
        if(nr<0||nr>=N||nc<0||nc>=N) return;
        const nb=grid[nr][nc];
        if(nb?.obstacle && !hitObs.has(`${nr},${nc}`)){
          hitObs.add(`${nr},${nc}`);
          damageObstacle(nb);
        }
      });
    });

    // 5) crear las especiales en su pivote
    toCreate.forEach(o=>{
      if(grid[o.r][o.c]){ grid[o.r][o.c].el.remove(); }
      const t=makeTile(o.type,o.r,o.c,o.special);
      t.el.classList.add("born");
      grid[o.r][o.c]=t;
    });
    await wait(120);

    // 6) gravedad + relleno
    for(let c=0;c<N;c++){
      let write=N-1;
      for(let r=N-1;r>=0;r--){
        if(grid[r][c]){
          if(write!==r){ const t=grid[r][c];
            grid[write][c]=t; grid[r][c]=null; t.r=write; t.c=c; place(t,true); }
          write--;
        }
      }
      for(let r=write;r>=0;r--){
        const type=TYPES[(Math.random()*TYPES.length)|0];
        grid[r][c]=makeTile(type,r,c);
      }
    }
    await wait(330);
  }
}

function damageObstacle(tileObj){

// Cuántos/qué obstáculos poner según el nivel
function obstacleCount(n){
  if(n<4)  return { ice:0, box:0, chain:0 };         // niveles 1-3: sin obstáculos
  if(n<7)  return { ice:2, box:0, chain:0 };          // 4-6: solo hielo
  if(n<11) return { ice:3, box:1, chain:0 };          // 7-10: hielo + caja
  if(n<16) return { ice:3, box:2, chain:1 };          // 11-15: los 3
  return   { ice:4, box:3, chain:2 };                 // 16+: más difícil
}

function placeObstacles(n){
  const counts=obstacleCount(n);
  const types=[
    ...Array(counts.ice).fill("ice"),
    ...Array(counts.box).fill("box"),
    ...Array(counts.chain).fill("chain"),
  ];
  if(types.length===0) return;
  // posiciones disponibles (evitar bordes y centro)
  const candidates=[];
  for(let r=1;r<N-1;r++) for(let c=1;c<N-1;c++) candidates.push([r,c]);
  candidates.sort(()=>Math.random()-.5);
  types.forEach((obs,i)=>{
    if(i>=candidates.length) return;
    const[r,c]=candidates[i];
    if(!grid[r][c]) return;
    // sustituir la ficha existente por la misma ficha + obstáculo encima
    const oldType=grid[r][c].type;
    grid[r][c].el.remove();
    grid[r][c]=makeTile(oldType,r,c,null,obs);
  });
}

function spawnBurst(tile, special){
  const s=cellSize();
  const cx = tile.c*s + s/2;
  const cy = tile.r*s + s/2;
  const colors=["#FFD98A","#FF3D7F","#3aa8e0","#3ddc78","#fff","#d9a8ff"];
  const count = special ? 14 : 6;
  for (let i=0;i<count;i++){
    const b=document.createElement("div");
    b.className="burst";
    b.style.background=colors[(Math.random()*colors.length)|0];
    b.style.left=cx+"px"; b.style.top=cy+"px";
    const ang=Math.random()*Math.PI*2, dist=(special?40:24)+Math.random()*36;
    b.style.setProperty("--bx",Math.cos(ang)*dist+"px");
    b.style.setProperty("--by",Math.sin(ang)*dist+"px");
    board.appendChild(b);
    setTimeout(()=>b.remove(),580);
  }
  if(special){ // onda de choque
    const w=document.createElement("div");
    w.className="shock"+(special==="rainbow"?" rb":"");
    w.style.left=cx+"px"; w.style.top=cy+"px";
    board.appendChild(w);
    setTimeout(()=>w.remove(),520);
  }
}

const fvBar=document.getElementById("feverbar");
const fvFill=document.getElementById("fvFill");
const fvLabel=document.getElementById("fvLabel");

function addFever(amount){
  if(feverActive) return;            // durante fever no se carga
  fever = Math.min(FEVER_MAX, fever + amount);
  updateFeverBar();
  if(fever >= FEVER_MAX) activateFever();
}
function updateFeverBar(){
  const pct = Math.min(100, fever/FEVER_MAX*100);
  fvFill.style.width = pct + "%";
  if(feverActive){
    fvLabel.textContent = "🔥 FEVER x10 🔥";
    fvBar.classList.add("ready");
  } else {
    fvLabel.textContent = `BOLLA FEVER ${Math.floor(fever)}/${FEVER_MAX}`;
    fvBar.classList.toggle("ready", fever>=FEVER_MAX);
  }
}
function activateFever(){
  feverActive = true;
  feverMult = 10;
  document.body.classList.add("fever");
  updateFeverBar();
  // flash cinematográfico
  let ff=document.querySelector(".feverflash");
  if(!ff){ ff=document.createElement("div"); ff.className="feverflash";
    ff.innerHTML="<span>¡BOLLA FEVER!</span>"; document.body.appendChild(ff); }
  ff.classList.remove("go"); void ff.offsetWidth; ff.classList.add("go");
  billRain(2200);
  // dura por jugadas: se vacía progresivamente; al llegar a 0 termina
  clearInterval(feverTimer);
  feverTimer=setInterval(()=>{
    fever -= 0.6;
    if(fever<=0){ fever=0; endFever(); }
    else { fvFill.style.width=(fever/FEVER_MAX*100)+"%"; }
  }, 600);
}
function endFever(){
  feverActive=false; feverMult=1;
  clearInterval(feverTimer);
  document.body.classList.remove("fever");
  fvBar.classList.remove("ready");
  updateFeverBar();
}
function billRain(ms){

    b.textContent = Math.random()<0.5 ? "💵" : "💸";

let levelOver = false;   // FASE 6 · corta resolve() en cuanto se gana/pierde

function checkEnd(){
  if (levelOver) return true;
  // victoria: objetivo cumplido O bingo completo (12 líneas posibles)
  if (goalLeft<=0 || bingoLines.size>=5){ levelOver=true; endLevel(true); return true; }
  if (moves<=0){ levelOver=true; endLevel(false); return true; }
  return false;
}

function calcStars(){
  // Modelo B: objetivo (1★) + bingo (2★) + eficiencia (3★)
  let s = 0;
  const goalDone = goalLeft <= 0;
  if (!goalDone) return 0;            // sin objetivo no hay nivel pasado
  s = 1;                              // ★ objetivo cumplido
  const linesDone = bingoLines.size;
  if (linesDone >= 2) s = 2;          // ★★ al menos 2 líneas de bingo
  const movesLeft = moves;
  const effRatio = movesLeft / movesStart;
  // ★★★: bingo fuerte (3+ líneas) Y terminó con holgura (>=22% movimientos)
  if (linesDone >= 3 && effRatio >= 0.22) s = 3;
  return s;
}

async function endLevel(win){
  const stars = win ? calcStars() : 0;
  const realWin = stars >= 1;
  card.className = "card " + (realWin ? "win" : "lose");

  document.getElementById("cardTitle").textContent =
    realWin ? (stars===3?"¡PERFECTO!":stars===2?"¡Muy bien!":"¡Nivel superado!")
            : (win?"Casi...":"Sin movimientos");
  document.getElementById("cardSub").textContent =
    realWin ? `Nivel ${level} completado`
            : "No alcanzaste el objetivo · reintenta";

  const movesUsed = movesStart - moves;
  const moveBonus = Math.max(0,moves)*8;   // FASE 6 · cada movimiento sobrante = +8 XP
  document.getElementById("resgrid").innerHTML =
    `<div class="resrow ${goalLeft<=0?'ok':''}"><span>Objetivo</span><b>${goalLeft<=0?'✓ Logrado':'✗ Incompleto'}</b></div>` +
    `<div class="resrow ${bingoLines.size>=2?'ok':''}"><span>Líneas BINGO</span><b>${bingoLines.size}</b></div>` +
    `<div class="resrow ${moves>0?'ok':''}"><span>Movimientos de sobra</span><b>${Math.max(0,moves)} → +${moveBonus} XP</b></div>`;

  // XP ganado por rendimiento (los movimientos sobrantes pesan más = premia eficiencia)
  const xpWon = realWin ? (25*stars + bingoLines.size*20 + moveBonus + combosThisLevel*6) : 0;

  // requisito desbloqueo
  const need = starsRequiredToPass(level);
  const canAdvance = stars >= need;
  bestStars[level] = Math.max(bestStars[level]||0, stars);
  const btn = document.getElementById("cardBtn");
  btn.style.visibility = "hidden";  // se muestra al final de la secuencia
  btn.textContent = !realWin ? "Reintentar ↻"
    : canAdvance ? "Siguiente nivel ▶" : `Necesitas ${need}★ · Reintentar`;
  card._advance = realWin && canAdvance;

  // estado inicial UI antes de animar
  document.getElementById("recCount").textContent = "0";
  const xpfill=document.getElementById("xpfill");
  const xpLvlEl=document.getElementById("xpLvl");
  const xpNums=document.getElementById("xpNums");

  let need0=xpForLvl(playerLvl);

  xpfill.style.width=(playerXP/need0*100)+"%";

  document.querySelectorAll("#starsRow .star").forEach(e=>e.classList.remove("on","off"));

  overlay.classList.add("show");

  // ---- SECUENCIA ANIMADA ----
  // 1) contar recaudación (puntos del nivel)
  await wait(350);
  const recEl=document.getElementById("recCount");
  const target=score;
  const steps=28;
  for(let i=1;i<=steps;i++){
    recEl.textContent=Math.round(target*i/steps).toLocaleString("en-US");
    await wait(26);
  }
  recEl.textContent=target.toLocaleString("en-US");

  // 2) llenar barra XP (puede subir de nivel)
  if (xpWon>0){
    document.getElementById("xpgain").innerHTML=`+ <b>${xpWon}</b> XP`;
    await wait(300);
    let remaining=xpWon;
    xpfill.style.transition="width 1.2s cubic-bezier(.22,1,.36,1)";
    while(remaining>0){
      let need1=xpForLvl(playerLvl);
      let space=need1-playerXP;
      if(remaining>=space){
        // sube de nivel
        remaining-=space;
        playerXP=0; playerLvl++;
        xpfill.style.width="100%";
        await wait(700);
        xpfill.classList.add("levelup");
        xpfill.style.transition="none"; xpfill.style.width="0%";
        await wait(60);
        xpfill.style.transition="width 1s cubic-bezier(.22,1,.36,1)";
        xpLvlEl.textContent=playerLvl;
        flashCombo(`¡NIVEL ${playerLvl}!`);
        await wait(500);
        xpfill.classList.remove("levelup");
      } else {
        playerXP+=remaining; remaining=0;
        let n2=xpForLvl(playerLvl);
        xpfill.style.width=(playerXP/n2*100)+"%";
        xpNums.textContent=`${playerXP}/${n2} XP`;
        await wait(1200);
      }
      let n3=xpForLvl(playerLvl);
      xpNums.textContent=`${playerXP}/${n3} XP`;
    }
    totalXP+=xpWon;
  }

  // 3) estrellas una a una
  await wait(250);
  const starEls=document.querySelectorAll("#starsRow .star");
  for(let i=0;i<starEls.length;i++){
    if(i<stars){ starEls[i].classList.add("on"); flashStarPing(); }

    await wait(430);

/* ============================================================
   BOOSTERS ESPECIALES — 6 poderes únicos
   Cada uno tiene 1 carga por nivel.
   Yate/Palma: modo targeting (el jugador elige fila/columna tocando).
   El resto: se activan instantáneamente al pulsar.
   ============================================================ */
const BOOSTERS = {
  disco:   { id:"disco",   icon:"🪩", label:"DISCO"  },
  yate:    { id:"yate",    icon:"🛥️", label:"YATE"   },
  palma:   { id:"palma",   icon:"🌴", label:"PALMA"  },
  diamond: { id:"diamond", icon:"💎", label:"RAIN"   },
  storm:   { id:"storm",   icon:"⚡", label:"STORM"  },
  crown:   { id:"crown",   icon:"👑", label:"CROWN"  },
};
let boosterCharges = {};      // {id: cargas restantes}
let targetingBooster = null;  // booster en modo targeting esperando toque

function initBoosters(){
  Object.keys(BOOSTERS).forEach(id=>{
    boosterCharges[id] = 1;
    const el = document.getElementById("bst-"+id);
    if(!el) return;
    el.classList.remove("used","targeting");
    let ch=el.querySelector(".charge");
    if(!ch){ ch=document.createElement("div"); ch.className="charge"; el.appendChild(ch); }
    ch.textContent="1";
    el.onclick = ()=>onBooster(id);
  });
}

function onBooster(id){
  if(busy || levelOver) return;
  if(boosterCharges[id]<=0) return;
  // Yate y Palma necesitan targeting (elegir fila/col)
  if(id==="yate" || id==="palma"){
    if(targetingBooster===id){ cancelTargeting(); return; }
    cancelTargeting();
    targetingBooster=id;
    document.getElementById("bst-"+id).classList.add("targeting");
    // highlight visual de filas/cols
    for(let r=0;r<N;r++) for(let c=0;c<N;c++){
      if(!grid[r][c]) continue;
      if(id==="yate") grid[r][c].el.classList.add("row-hint");
      else grid[r][c].el.classList.add("col-hint");
    }
    return;
  }
  fireBooster(id);
}

function cancelTargeting(){
  if(!targetingBooster) return;
  document.getElementById("bst-"+targetingBooster)?.classList.remove("targeting");
  for(let r=0;r<N;r++) for(let c=0;c<N;c++)
    grid[r]?.[c]?.el.classList.remove("row-hint","col-hint");
  targetingBooster=null;
}

// Se llama cuando el jugador toca una ficha durante targeting
function handleTargetTap(tileObj){
  if(!targetingBooster) return false;
  const id=targetingBooster;
  cancelTargeting();
  fireBoosterTargeted(id, tileObj.r, tileObj.c);
  return true;
}

async function fireBoosterTargeted(id, r, c){
  busy=true;
  useBooster(id);
  const hit=new Set();
  if(id==="yate"){ for(let cc=0;cc<N;cc++) hit.add(`${r},${cc}`); }
  else          { for(let rr=0;rr<N;rr++) hit.add(`${rr},${c}`); }
  await detonateBoosterHit(hit, id);
  busy=false; if(!checkEnd()) await resolve();
}

async function fireBooster(id){
  busy=true;
  useBooster(id);
  const hit=new Set();

  if(id==="disco"){
    // ~12 fichas al azar
    const all=[]; for(let r=0;r<N;r++) for(let c=0;c<N;c++) if(grid[r][c]) all.push(`${r},${c}`);
    all.sort(()=>Math.random()-.5);
    all.slice(0,12).forEach(k=>hit.add(k));

  } else if(id==="diamond"){
    // convierte 8 fichas al azar en diamante y las elimina
    const all=[]; for(let r=0;r<N;r++) for(let c=0;c<N;c++) if(grid[r][c]) all.push([r,c]);
    all.sort(()=>Math.random()-.5);
    all.slice(0,8).forEach(([r,c])=>{
      grid[r][c].el.classList.add("pop");
      spawnBurst(grid[r][c],"rainbow");
      hit.add(`${r},${c}`);
    });
    // lluvia de diamantes visual
    billRainCustom("💎",1400);

  } else if(id==="storm"){
    // explosión 5×5 central
    const cr=Math.floor(N/2), cc=Math.floor(N/2);
    for(let dr=-2;dr<=2;dr++) for(let dc=-2;dc<=2;dc++){
      const nr=cr+dr, nc=cc+dc;
      if(nr>=0&&nr<N&&nc>=0&&nc<N) hit.add(`${nr},${nc}`);
    }
    showCombo("⚡MIAMI STORM⚡");

  } else if(id==="crown"){
    // detona todas las fichas especiales del tablero
    let found=false;
    for(let r=0;r<N;r++) for(let c=0;c<N;c++){
      if(grid[r][c]?.special){ hit.add(`${r},${c}`); found=true; }
    }
    if(!found){
      // si no hay especiales, elimina las 4 esquinas
      [[0,0],[0,N-1],[N-1,0],[N-1,N-1]].forEach(([r,c])=>hit.add(`${r},${c}`));
    }
    showCombo("👑 CROWN BLAST 👑");
  }

  await detonateBoosterHit(hit, id);
  busy=false; if(!checkEnd()) await resolve();
}

async function detonateBoosterHit(hit, id){
  if(hit.size===0){ await wait(100); return; }
  // fx visual
  hit.forEach(k=>{
    const[r,c]=k.split(",").map(Number);
    const tl=grid[r][c]; if(!tl) return;
    spawnBurst(tl,"bomb");
    tl.el.classList.add("pop");
  });
  // bonus de puntos
  let gained = hit.size * 20 * feverMult;
  addFever(hit.size*0.3);
  score+=gained; updateHUD();
  await wait(280);
  hit.forEach(k=>{
    const[r,c]=k.split(",").map(Number);
    if(grid[r][c]){ grid[r][c].el.remove(); grid[r][c]=null; }
  });
  // gravedad + relleno
  for(let c=0;c<N;c++){
    let w=N-1;
    for(let r=N-1;r>=0;r--){ if(grid[r][c]){
      if(w!==r){ const t=grid[r][c];grid[w][c]=t;grid[r][c]=null;t.r=w;t.c=c;place(t,true);} w--;}}
    for(let r=w;r>=0;r--){ grid[r][c]=makeTile(TYPES[(Math.random()*TYPES.length)|0],r,c); }
  }
  await wait(320);
}

function useBooster(id){
  boosterCharges[id]--;
  const el=document.getElementById("bst-"+id);
  if(boosterCharges[id]<=0){ el.classList.add("used"); }
  const ch=el?.querySelector(".charge");
  if(ch) ch.textContent=Math.max(0,boosterCharges[id]);
}

// Config de nivel: objetivo y movimientos escalan (progresión real)
/* ============================================================
   FASE 3 · CARTÓN BINGO DINÁMICO
   - 5x5, columnas B(1-15) I(16-30) N(31-45) G(46-60) O(61-75)
   - Centro = comodín libre
   - Cada match marca 1 número segun el tipo de ficha
   - Línea/columna/diagonal completa = premio
   ============================================================ */
const bingogrid = document.getElementById("bingogrid");
const bingofx = document.getElementById("bingofx");
let bingo = [];           // 5x5 de {num, marked, free}
let bingoLines = new Set(); // claves de líneas ya premiadas

// cada tipo de ficha apunta a una columna del cartón
const TYPE_COL = { ballB:0, coin:1, clover:2, star:3, diamond:4, purple:2 };

function buildBingo(){
  bingo=[]; bingoLines=new Set();
  bingogrid.innerHTML="";
  const ranges=[[1,15],[16,30],[31,45],[46,60],[61,75]];
  for(let r=0;r<5;r++){
    bingo[r]=[];
    for(let c=0;c<5;c++){
      const free = (r===2&&c===2);
      const [lo,hi]=ranges[c];
      const num = lo + ((Math.random()*(hi-lo+1))|0);
      const cell=document.createElement("div");
      cell.className="bcell"+(free?" free":"");
      cell.textContent = free ? "★" : num;
      bingogrid.appendChild(cell);
      bingo[r][c]={num,marked:free,free,el:cell};
    }
  }
}

// marca un número libre en la columna asociada al tipo
function bingoMark(type){
  const col = TYPE_COL[type] ?? ((Math.random()*5)|0);
  // buscar celda sin marcar en esa columna; si no, cualquiera
  let target=null;
  for(let r=0;r<5;r++) if(!bingo[r][col].marked){ target=bingo[r][col]; break; }
  if(!target){
    outer: for(let r=0;r<5;r++)for(let c=0;c<5;c++)
      if(!bingo[r][c].marked){ target=bingo[r][c]; break outer; }
  }
  if(!target) return 0;
  target.marked=true;
  target.el.classList.add("mark");
  return checkBingoLines();
}

// detecta filas/columnas/diagonales completas nuevas -> premio
function checkBingoLines(){
  let prize=0;
  const win=(cells,key)=>{
    if(bingoLines.has(key)) return;
    if(cells.every(([r,c])=>bingo[r][c].marked)){
      bingoLines.add(key);
      cells.forEach(([r,c])=>bingo[r][c].el.classList.add("line"));
      prize += 500;
      addFever(3);                              // línea bingo carga fuerte Fever
      flashBingo(bingoLines.size>=4 ? "¡BINGO!" : "¡LÍNEA!");
    }
  };
  for(let r=0;r<5;r++) win([0,1,2,3,4].map(c=>[r,c]), "R"+r);
  for(let c=0;c<5;c++) win([0,1,2,3,4].map(r=>[r,c]), "C"+c);
  win([[0,0],[1,1],[2,2],[3,3],[4,4]], "D1");
  win([[0,4],[1,3],[2,2],[3,1],[4,0]], "D2");
  return prize;
}

function flashBingo(txt){
  bingofx.textContent=txt;
  bingofx.classList.remove("show"); void bingofx.offsetWidth;
  bingofx.classList.add("show");
}

function loadLevel(n){
  level=n;
  goalType = TYPES[1 + ((n-1) % (TYPES.length-1))]; // rota objetivo (no ballB siempre)

  // CURVA DE DIFICULTAD · subida media-alta (opción C, calibramos juntos)
  // Más objetivo y menos margen de movimientos -> hay que jugar bien desde el 1.
  goalTotal = 20 + Math.round(n*3.6);            // un pelín más accesible
  goalLeft  = goalTotal;
  movesStart = 18 + Math.floor(n*0.6);           // +2 movimientos de margen
  moves = movesStart;
  combosThisLevel = 0;
  levelOver = false;
  fever = 0; feverActive = false; feverMult = 1;
  clearInterval(feverTimer);
  document.body.classList.remove("fever");
  if(typeof updateFeverBar==="function") updateFeverBar();
  cancelTargeting();
  initBoosters();

  elLvl.textContent = "NIVEL " + n;
  elGoalIcon.textContent = SYM[goalType]==="B" ? "🪙" :
    goalType==="clover"?"🍀":goalType==="star"?"★":goalType==="diamond"?"💎":"◆";
  const names={ballB:"bolas B",coin:"fichas oro",clover:"tréboles",
    star:"estrellas",diamond:"diamantes",purple:"moradas"};
  elGoalName.textContent = names[goalType];
  buildBingo();
  updateHUD();
  build();
  placeObstacles(n);   // OBSTÁCULOS · se colocan sobre el tablero generado
}

// Reposicionar al cambiar tamaño
let rt;
window.addEventListener("resize",()=>{
  clearTimeout(rt);
  rt=setTimeout(()=>{ for(let r=0;r<N;r++)for(let c=0;c<N;c++) if(grid[r]?.[c]) place(grid[r][c],false); },120);
});

document.getElementById("restart").addEventListener("click",()=>loadLevel(level));
document.getElementById("cardBtn").addEventListener("click",()=>{
  overlay.classList.remove("show");
  loadLevel(card._advance ? level+1 : level);
});

// Arranque: leer nivel desde URL param ?level=N (producción) o nivel 1 por defecto
const _urlLevel = parseInt(new URLSearchParams(location.search).get("level") || "1") || 1;
loadLevel(_urlLevel);
</script>
